<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBP/RBSI সম্পূর্ণ ১০০ নম্বরের মক টেস্ট</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #2980b9;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --light-bg: #f8f9fa;
        }
        body {
            font-family: 'Kalpurush', 'Siyam Rupali', Arial, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container h2 { color: var(--primary-color); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: var(--secondary-color); color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .login-btn:hover { background: #2471a3; }
        .error-msg { color: var(--danger-color); margin-top: 10px; font-weight: bold; display: none; }

        .exam-interface { display: none; max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .header-panel { background: var(--primary-color); color: white; padding: 15px 20px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer-box { background: #e74c3c; padding: 8px 15px; border-radius: 4px; font-size: 18px; font-weight: bold; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .question-box { background: white; padding: 30px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-height: 420px; position: relative; }
        .question-text { font-size: 19px; font-weight: bold; color: #111; line-height: 1.6; }
        
        canvas { display: block; margin: 15px auto; background: #fff; border: 1px solid #eee; border-radius: 4px; }
        
        .option-container { margin-top: 20px; }
        .option-label { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; background: var(--light-bg); border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .option-label:hover { background: #edf2f7; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        .control-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: bold; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: var(--secondary-color); color: white; }
        .btn-submit { background: var(--success-color); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .sidebar { background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .grid-title { margin-top: 0; margin-bottom: 15px; color: #555; }
        .question-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 450px; overflow-y: auto; padding: 5px; }
        .grid-num { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #e0e0e0; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .grid-num.answered { background: var(--success-color); color: white; }
        .grid-num.current { border: 2px solid #000; box-shadow: 0 0 5px rgba(0,0,0,0.3); }

        .result-panel { display: none; max-width: 850px; margin: 30px auto; background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-header { text-align: center; color: var(--primary-color); margin-bottom: 30px; }
        .score-summary { display: flex; justify-content: space-around; margin-bottom: 40px; background: #f1f2f6; padding: 20px; border-radius: 6px; font-size: 18px; }
        .review-section { margin-top: 30px; }
        .review-item { padding: 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px; background: #fafafa; border-radius: 4px; }
        .review-q { font-weight: bold; font-size: 17px; margin-bottom: 10px; }
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; color: white; margin-bottom: 10px; }
        .status-correct { background: var(--success-color); }
        .status-wrong { background: var(--danger-color); }
        .status-unanswered { background: #7f8c8d; }
        .explanation-box { background: #e8f4f8; border-left: 4px solid var(--secondary-color); padding: 12px; margin-top: 10px; font-size: 15px; color: #2c3e50; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <h2>পরীক্ষার্থী লগইন (Real Exam System)</h2>
        <div class="input-group">
            <label for="username">ইউজারনেম (Username):</label>
            <input type="text" id="username" placeholder="Username লিখুন...">
        </div>
        <div class="input-group">
            <label for="password">পাসওয়ার্ড (Password):</label>
            <input type="password" id="password" placeholder="Password লিখুন...">
        </div>
        <button class="login-btn" onclick="attemptLogin()">পরীক্ষা শুরু করো</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="examScreen" class="exam-interface">
        <div class="header-panel">
            <div><strong>পরীক্ষার্থী:</strong> <span id="studentName"></span></div>
            <div class="timer-box">অবশিষ্ট সময়: <span id="timer">60:00</span></div>
        </div>
        <div class="main-layout">
            <div class="question-box">
                <div id="questionText" class="question-text"></div>
                <canvas id="graphicCanvas" style="display:none;"></canvas>
                <div id="optionsContainer" class="option-container"></div>
                <div class="control-btns">
                    <button class="btn btn-prev" id="prevBtn" onclick="navigateQuestion(-1)">পূর্ববর্তী</button>
                    <button class="btn btn-next" id="nextBtn" onclick="navigateQuestion(1)">পরবর্তী</button>
                    <button class="btn btn-submit" id="submitBtn" onclick="confirmSubmit()" style="display:none;">পরীক্ষা সম্পন্ন করুন</button>
                </div>
            </div>
            <div class="sidebar">
                <h4 class="grid-title">প্রশ্নপত্র প্যালেট</h4>
                <div id="questionGrid" class="question-grid"></div>
            </div>
        </div>
    </div>

    <div id="resultScreen" class="result-panel">
        <div class="result-header">
            <h2>পরীক্ষার ফলাফল ও মূল্যায়ন</h2>
            <p>আপনার উত্তরপত্র সফলভাবে মূল্যায়ন করা হয়েছে।</p>
        </div>
        <div class="score-summary">
            <div>মোট প্রশ্ন: <strong id="resTotal">0</strong></div>
            <div>সঠিক উত্তর: <strong id="resCorrect" style="color:var(--success-color);">0</strong></div>
            <div>ভুল উত্তর: <strong id="resWrong" style="color:var(--danger-color);">0</strong></div>
            <div>অনুপস্থিত: <strong id="resLeft">0</strong></div>
        </div>
        <hr>
        <h3>প্রশ্নোত্তর পর্যালোচনা ও বিস্তারিত ব্যাখ্যা:</h3>
        <div id="reviewContainer" class="review-section"></div>
    </div>

    <script>
        const allowedUsers = {
            "rohit": "rohit21",
            "rahul": "rahul2026",
            "priya": "wbp2026",
            "amit": "kolkata123",
            "subho": "rbsi2026"
        };

        let currentQuestionIndex = 0;
        let examTimer = null;
        let totalSeconds = 3600; 
        let currentUser = "";
        let studentAnswers = {};

        // প্রশ্নপত্র ব্যাংক শুরু (১ থেকে ২৫)
        const questions = [
            {
                id: 1,

                options: ["(A) মাইক্রো তরঙ্গ", "(B) অতিবেগুনী রশ্মি", "(C) অবলোহিত রশ্মি", "(D) X-রশ্মি"],
                correct: 0,
                type: "text",
                explanation: "টেলিযোগাযোগে (যেমন মোবাইল নেটওয়ার্ক ও উপগ্রহ যোগাযোগ) সিগন্যাল আদান-প্রদানের জন্য উচ্চ ফ্রিকোয়েন্সির মাইক্রো তরঙ্গ ব্যবহার করা হয়।"
            },
            {
                id: 2,
                text: "২. 'উচ্চতা জনিত ভয়'-কে বলা হয়:-",
                options: ["(A) অ্যাক্রোফোবিয়া", "(B) অ্যারোফোবিয়া", "(C) অ্যাগোরাফোবিয়া", "(D) জুফোবিয়া"],
                correct: 0,
                type: "text",
                explanation: "উঁচু স্থানে ওঠার তীব্র বা অস্বাভাবিক ভয়কে চিকিৎসা বিজ্ঞানের ভাষায় অ্যাক্রোফোবিয়া (Acrophobia) বলা হয়।"
            },
            {
                id: 3,
                text: "৩. তিন ব্যক্তির বর্তমান বয়সের অনুপাত 4 : 7 : 9। ৮ বছর আগে তাদের বয়সের যোগফল ছিল 56। তাদের বর্তমান বয়স কত?",
                options: ["(A) 20, 35, 45", "(B) 16, 28, 36", "(C) 8, 20, 28", "(D) 8, 14, 18"],
                correct: 1,
                type: "text",
                explanation: "৮ বছর আগে সমষ্টি ৫৬ হলে, বর্তমানে ৩ জনের মোট বয়স হবে $56 + (3 \\times 8) = 80$ বছর। অনুপাত যোগফল $4+7+9=20$। সাধারণ গুণিতক $80/20 = 4$। অতএব বয়স যথাক্রমে ১৬, ২৮ ও ৩৬ বছর।"

                correct: 2,
                type: "text",

                id: 5,
                text: "৫. সাইখম মীরাবাই চানু কোন খেলার সাথে যুক্ত?",

                type: "text",
                explanation: "অর্ধেক পূর্ণ হতে লাগে ৩ ঘণ্টা। বাকি অর্ধেক (১/২ অংশ) পূর্ণ করতে মোট ৪টি নল একসাথে কাজ করবে। সময় লাগবে $(1/2) / (4/6) = 3/4$ ঘণ্টা বা ৪৫ মিনিট। মোট সময় = ৩ ঘণ্টা ৪৫ মিনিট।"

        function attemptLogin() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            if (allowedUsers[userIn] && allowedUsers[userIn] === passIn) {
                if (localStorage.getItem("exam_done_" + userIn)) {
                    errorDiv.innerText = "দুঃখিত! আপনি ইতিমধ্যে এই অ্যাকাউন্ট থেকে পরীক্ষা দিয়ে ফেলেছেন। ১ বারই মাত্র লিমিট।";
                    errorDiv.style.display = "block";
                    return;
                }
                currentUser = userIn;
                document.getElementById('studentName').innerText = userIn.toUpperCase();
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('examScreen').style.display = "block";
                startExam();
            } else {
                errorDiv.innerText = "ভুল ইউজারনেম অথবা পাসওয়ার্ড! আবার চেষ্টা করুন।";
                errorDiv.style.display = "block";
            }
        }

        function startExam() {
            buildQuestionGrid();
            showQuestion(0);
            
            examTimer = setInterval(() => {
                totalSeconds--;
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;
                document.getElementById('timer').innerText = 
                    (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;

                if (totalSeconds <= 0) {
                    clearInterval(examTimer);
                    alert("আপনার নির্ধারিত সময় শেষ! উত্তরপত্রটি স্বয়ংক্রিয়ভাবে সাবমিট হচ্ছে।");
                    processSubmit();
                }
            }, 1000);
        }

        function buildQuestionGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = "";
            questions.forEach((q, index) => {
                const btn = document.createElement('div');
                btn.className = "grid-num";
                btn.innerText = q.id;
                btn.id = "grid-q-" + index;
                btn.onclick = () => showQuestion(index);
                grid.appendChild(btn);
            });
        }

        function showQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            
            questions.forEach((_, i) => {
                const g = document.getElementById("grid-q-" + i);
                g.className = "grid-num" + (studentAnswers[i] !== undefined ? " answered" : "") + (i === index ? " current" : "");
            });

            document.getElementById('questionText').innerText = q.text;
            const canvas = document.getElementById('graphicCanvas');
            const ctx = canvas.getContext('2d');
            canvas.style.display = "none";

            if (q.type.startsWith("canvas_")) {
                canvas.style.display = "block";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (q.type === "canvas_triangle") {
                    canvas.width = 380; canvas.height = 150;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 3.5; ctx.lineJoin = 'round';
                    const drawL = (p1, p2) => { ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); };
                    const pA = { x: 30, y: 140 }, pB = { x: 350, y: 140 }, pD = { x: 110, y: 15 }, pC = { x: 270, y: 15 };
                    const pAb = { x: 110, y: 140 }, pCb = { x: 270, y: 140 }, pMidT = { x: 190, y: 15 };
                    drawL(pA, pB); drawL(pC, pD); drawL(pA, pD); drawL(pB, pC); drawL(pD, pAb); drawL(pC, pCb);
                    drawL(pD, pCb); drawL(pAb, pC); drawL(pMidT, pAb);
                } 
                else if (q.type === "canvas_dice") {
                    canvas.width = 580; canvas.height = 130;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5; ctx.fillStyle = '#000';
                    function renderDice(startX, startY, topS, frontS, rightS) {
                        const w = 60, h = 62, dx = 25, dy = 20;
                        const p1 = { x: startX, y: startY + dy }, p2 = { x: startX + w, y: startY + dy };
                        const p3 = { x: startX, y: startY + dy + h }, p4 = { x: startX + w, y: startY + dy + h };
                        const p5 = { x: startX + dx, y: startY }, p6 = { x: startX + w + dx, y: startY }, p7 = { x: startX + w + dx, y: startY + h };
                        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p4.x, p4.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p5.x, p5.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p2.x, p2.y); ctx.closePath(); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.stroke();
                        ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(frontS, startX + w/2, startY + dy + h/2);
                        ctx.fillText(topS, startX + (w + dx)/2, startY + dy/2 + 2);
                        ctx.fillText(rightS, startX + w + dx/2, startY + dy + h/2 - 2);
                    }
                    renderDice(15, 10, '@', '—', '*'); renderDice(155, 10, '@', '*', '+');
                    renderDice(295, 10, '*', '$', '+'); renderDice(435, 10, '$', '8', '+');
                }
                else if (q.type === "canvas_venn") {
                    canvas.width = 500; canvas.height = 120;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5; ctx.font = '16px Arial'; ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(40, 50, 18, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(62, 50, 18, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(84, 50, 18, 0, Math.PI*2); ctx.stroke(); ctx.fillText('(A)', 55, 100);
                    ctx.beginPath(); ctx.arc(170, 40, 15, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(200, 40, 15, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(185, 68, 15, 0, Math.PI*2); ctx.stroke(); ctx.fillText('(B)', 175, 100);
                    ctx.beginPath(); ctx.arc(295, 50, 22, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(295, 50, 12, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(340, 55, 13, 0, Math.PI*2); ctx.stroke(); ctx.fillText('(C)', 310, 100);
                    ctx.beginPath(); ctx.arc(430, 50, 24, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(420, 50, 11, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(440, 50, 11, 0, Math.PI*2); ctx.stroke(); ctx.fillText('(D)', 420, 100);
                }
                else if (q.type === "canvas_matrix") {
                    canvas.width = 450; canvas.height = 260;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.font = '14px Arial'; ctx.fillStyle = '#000';
                    ctx.strokeRect(10, 10, 210, 150);
                    ctx.beginPath(); ctx.moveTo(80, 10); ctx.lineTo(80, 160); ctx.moveTo(150, 10); ctx.lineTo(150, 160); ctx.moveTo(10, 60); ctx.lineTo(220, 60); ctx.moveTo(10, 110); ctx.lineTo(220, 110); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(45, 15); ctx.lineTo(45, 55); ctx.moveTo(25, 35); ctx.lineTo(65, 35); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(115, 15); ctx.lineTo(115, 55); ctx.moveTo(95, 35); ctx.lineTo(135, 35); ctx.moveTo(100, 20); ctx.lineTo(130, 50); ctx.moveTo(100, 50); ctx.lineTo(130, 20); ctx.stroke();
                    ctx.strokeRect(175, 20, 25, 25); ctx.beginPath(); ctx.moveTo(187.5, 20); ctx.lineTo(187.5, 45); ctx.moveTo(175, 32.5); ctx.lineTo(200, 32.5); ctx.stroke();
                    ctx.fillRect(179, 24, 3, 3); ctx.fillRect(193, 24, 3, 3); ctx.fillRect(179, 37, 3, 3); ctx.fillRect(193, 37, 3, 3);
                    const drawD = (cx, cy, r) => { ctx.beginPath(); ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r, cy); ctx.lineTo(cx, cy+r); ctx.lineTo(cx-r, cy); ctx.closePath(); ctx.stroke(); };
                    drawD(45, 85, 15); drawD(115, 85, 15); ctx.beginPath(); ctx.moveTo(100, 85); ctx.lineTo(130, 85); ctx.moveTo(115, 70); ctx.lineTo(115, 100); ctx.stroke();
                    drawD(185, 85, 15); ctx.fillRect(171, 71, 3, 3); ctx.fillRect(196, 71, 3, 3); ctx.fillRect(171, 96, 3, 3); ctx.fillRect(196, 96, 3, 3);
                    const drawF = (cx, cy) => { ctx.beginPath(); ctx.arc(cx, cy-8, 6, 0, Math.PI*2); ctx.arc(cx, cy+8, 6, 0, Math.PI*2); ctx.arc(cx-8, cy, 6, 0, Math.PI*2); ctx.arc(cx+8, cy, 6, 0, Math.PI*2); ctx.stroke(); };
                    drawF(45, 135); drawF(115, 135); ctx.beginPath(); ctx.moveTo(102, 135); ctx.lineTo(128, 135); ctx.moveTo(115, 122); ctx.lineTo(115, 148); ctx.stroke();
                    ctx.font = 'bold 16px Arial'; ctx.fillText('?', 180, 140);
                    ctx.strokeRect(10, 190, 280, 40); ctx.beginPath(); ctx.moveTo(80, 190); ctx.lineTo(80, 230); ctx.moveTo(150, 190); ctx.lineTo(150, 230); ctx.moveTo(220, 190); ctx.lineTo(220, 230); ctx.stroke();
                    drawF(45, 210); ctx.fillRect(43, 208, 4, 4); ctx.font = '12px Arial'; ctx.fillText('(1)', 45, 245);
                    drawF(115, 210); ctx.fillRect(102, 196, 3, 3); ctx.fillRect(125, 196, 3, 3); ctx.fillRect(102, 221, 3, 3); ctx.fillRect(125, 221, 3, 3); ctx.fillText('(2)', 115, 245);
                    drawF(185, 210); ctx.beginPath(); ctx.moveTo(172, 210); ctx.lineTo(198, 210); ctx.moveTo(185, 197); ctx.lineTo(185, 223); ctx.stroke(); ctx.fillText('(3)', 185, 245);
                    drawF(255, 210); ctx.fillRect(253, 198, 4, 4); ctx.fillRect(253, 218, 4, 4); ctx.fillText('(4)', 255, 245);
                }
            }

            const optContainer = document.getElementById('optionsContainer');
            optContainer.innerHTML = "";
            q.options.forEach((opt, oIdx) => {
                const label = document.createElement('label');
                label.className = "option-label";
                const radio = document.createElement('input');
                radio.type = "radio";
                radio.name = "quiz_opt";
                radio.value = oIdx;
                if (studentAnswers[index] === oIdx) radio.checked = true;
                radio.onchange = () => {
                    studentAnswers[index] = oIdx;
                    document.getElementById("grid-q-" + index).classList.add("answered");
                };
                label.appendChild(radio);
                label.appendChild(document.createTextNode(opt));
                optContainer.appendChild(label);
            });

            document.getElementById('prevBtn').disabled = (index === 0);
            if (index === questions.length - 1) {
                document.getElementById('nextBtn').style.display = "none";
                document.getElementById('submitBtn').style.display = "block";
            } else {
                document.getElementById('nextBtn').style.display = "block";
                document.getElementById('submitBtn').style.display = "none";
            }
        }

        function navigateQuestion(step) {
            let targetIndex = currentQuestionIndex + step;
            if (targetIndex >= 0 && targetIndex < questions.length) {
                showQuestion(targetIndex);
            }
        }

        function confirmSubmit() {
            if (confirm("আপনি কি নিশ্চিত যে আপনি পরীক্ষাটি সম্পন্ন করে খাতা জমা দিতে চান?")) {
                processSubmit();
            }
        }

        function processSubmit() {
            clearInterval(examTimer);
            localStorage.setItem("exam_done_" + currentUser, "true");
            document.getElementById('examScreen').style.display = "none";
            document.getElementById('resultScreen').style.display = "block";

            let correctCount = 0, wrongCount = 0, leftCount = 0;
            const reviewContainer = document.getElementById('reviewContainer');
            reviewContainer.innerHTML = "";

            questions.forEach((q, index) => {
                const userAns = studentAnswers[index];
                const isCorrect = (userAns === q.correct);
                
                if (userAns === undefined) leftCount++;
                else if (isCorrect) correctCount++;
                else wrongCount++;

                const item = document.createElement('div');
                item.className = "review-item";
                const qText = document.createElement('div');
                qText.className = "review-q";
                qText.innerText = q.text;
                item.appendChild(qText);

                const tag = document.createElement('span');
                tag.className = "status-tag " + (userAns === undefined ? "status-unanswered" : (isCorrect ? "status-correct" : "status-wrong"));
                tag.innerText = userAns === undefined ? "উত্তর দেওয়া হয়নি" : (isCorrect ? "সঠিক উত্তর" : "ভুল উত্তর");
                item.appendChild(tag);

                const ansDetails = document.createElement('div');
                ansDetails.innerHTML = `আপনার উত্তর: <strong>${userAns !== undefined ? q.options[userAns] : 'ফাঁকা'}</strong> | সঠিক উত্তর: <strong style="color:var(--success-color);">${q.options[q.correct]}</strong>`;
                item.appendChild(ansDetails);

                const exp = document.createElement('div');
                exp.className = "explanation-box";
                exp.innerHTML = `<strong>বিশ্লেষণ ও সমাধান:</strong><br>${q.explanation}`;
                item.appendChild(exp);

                reviewContainer.appendChild(item);
            });

            document.getElementById('resTotal').innerText = questions.length;
            document.getElementById('resCorrect').innerText = correctCount;
            document.getElementById('resWrong').innerText = wrongCount;
            document.getElementById('resLeft').innerText = leftCount;
        }
    </script>
</body>
</html>
