<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WBP/RBSI সম্পূর্ণ ১০০ নম্বরের মাস্টার মক টেস্ট</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --light-bg: #f4f7f6;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-color);
            padding-bottom: 30px;
        }

        /* Portal Login Style */
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--secondary-color);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background: #2980b9;
        }
        .error-msg {
            color: var(--danger-color);
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            display: none;
        }

        /* Test Environment Layout */
        .exam-interface {
            display: none;
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .header-panel {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .timer-box {
            background: var(--danger-color);
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr 300px;
            }
        }

        .question-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 420px;
        }
        .question-text {
            font-size: 19px;
            font-weight: bold;
            color: #222;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        /* Options Style */
        .option-container {
            margin-bottom: 25px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 12px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: bold;
        }
        .option-label:hover {
            background: #f8fafc;
            border-color: var(--secondary-color);
        }
        .option-label input {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--secondary-color);
        }
        
        /* Navigation Controls */
        .control-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }
        .btn-prev { background: #7f8c8d; }
        .btn-next { background: var(--secondary-color); }
        .btn-submit { background: var(--success-color); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Sidebar Palette Grid */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .grid-title {
            margin-bottom: 15px;
            font-size: 16px;
            color: #555;
            font-weight: bold;
        }
        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding: 4px;
        }
        .grid-num {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .grid-num.answered {
            background: var(--success-color);
            color: white;
        }
        .grid-num.current {
            border: 3px solid #2c3e50;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        /* User Specific Puzzle Custom Containers */
        .circle-container {
            width: 180px;
            height: 180px;
            border: 3px solid #000;
            border-radius: 50%;
            margin: 0 auto 25px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            position: relative;
        }
        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }
        .circle-container .cell:nth-child(1) { border-right: 2px solid #000; border-bottom: 2px solid #000; }
        .circle-container .cell:nth-child(2) { border-bottom: 2px solid #000; }
        .circle-container .cell:nth-child(3) { border-right: 2px solid #000; }
        .question-mark { color: #e74c3c; }

        .matrix-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 220px;
            margin: 0 auto 30px auto;
            border: 2px solid #000;
        }
        .matrix-container .cell {
            border: 1px solid #000;
            padding: 12px 0;
            font-size: 22px;
            font-weight: bold;
            color: #222;
            background-color: #fff;
        }
        .matrix-container .cell:nth-last-child(-n+3) {
            background-color: #f9f9f9;
        }

        /* Results Sheet Panel */
        .result-panel {
            display: none;
            max-width: 850px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .score-summary {
            display: flex;
            justify-content: space-around;
            background: #f1f2f6;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            margin: 25px 0;
            font-weight: bold;
        }
        .review-item {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        .review-q {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 10px;
            color: #111;
        }
        .status-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
        .status-correct { background: var(--success-color); }
        .status-wrong { background: var(--danger-color); }
        .status-unanswered { background: #7f8c8d; }
        .explanation-box {
            background: #e8f4f8;
            border-left: 4px solid var(--secondary-color);
            padding: 12px;
            margin-top: 12px;
            font-size: 15px;
            line-height: 1.5;
            color: #2c3e50;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. LOGIN COMPONENT -->
    <div id="loginScreen" class="login-container">
        <h2>Test Bazar Portal</h2>
        <div class="input-group">
            <label>ইউজারনেম (Username):</label>
            <input type="text" id="username" placeholder="Username লিখুন..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>পাসওয়ার্ড (Password):</label>
            <input type="password" id="password" placeholder="Password লিখুন...">
        </div>
        <button class="login-btn" onclick="attemptLogin()">পরীক্ষা শুরু করো</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <!-- 2. MAIN ACTIVE MOCK COMPONENT -->
    <div id="examScreen" class="exam-interface">
        <div class="header-panel">
            <div>
                <strong id="studentName" style="font-size:18px;"></strong>
                <div id="attemptDisplay" style="font-size:13px; opacity:0.9; margin-top:3px;"></div>
            </div>
            <div class="timer-box">অবশিষ্ট সময়: <span id="timer">60:00</span></div>
        </div>
        
        <div class="main-layout">
            <div class="question-box">
                <div id="questionText" class="question-text"></div>
                
                <!-- USER CUSTOM PUZZLE HOUSINGS -->
                <div id="puzzle37Area" class="hidden">
                    <div class="circle-container">
                        <div class="cell question-mark">?</div>
                        <div class="cell">8</div>
                        <div class="cell">216</div>
                        <div class="cell">64</div>
                    </div>
                </div>

                <div id="puzzle92Area" class="hidden">
                    <div class="matrix-container">
                        <div class="cell">7</div><div class="cell">3</div><div class="cell">2</div>
                        <div class="cell">4</div><div class="cell">9</div><div class="cell">6</div>
                        <div class="cell">2</div><div class="cell">1</div><div class="cell">5</div>
                        <div class="cell">69</div><div class="cell">91</div><div class="cell question-mark">?</div>
                    </div>
                </div>
                
                <div id="optionsContainer" class="option-container"></div>
                
                <div class="control-btns">
                    <button class="nav-btn btn-prev" id="prevBtn" onclick="navigateQuestion(-1)">পূর্ববর্তী</button>
                    <button class="nav-btn btn-next" id="nextBtn" onclick="navigateQuestion(1)">পরবর্তী</button>
                    <button class="nav-btn btn-submit" id="submitBtn" onclick="confirmSubmit()" style="display:none;">পরীক্ষা সম্পন্ন করুন</button>
                </div>
            </div>

            <div class="sidebar">
                <h4 class="grid-title">প্রশ্নপত্র প্যালেট (1-100)</h4>
                <div id="questionGrid" class="question-grid"></div>
            </div>
        </div>
    </div>

    <!-- 3. DETAILED ANALYTICS SCORECARD -->
    <div id="resultScreen" class="result-panel">
        <div style="text-align:center; margin-bottom:25px;">
            <h2>পরীক্ষার ফলাফল ও মূল্যায়ন বিবরণী</h2>
            <p style="color:#666; margin-top:5px;">আপনার উত্তরপত্র সিস্টেমে সফলভাবে সংরক্ষিত হয়েছে।</p>
        </div>
        <div class="score-summary">
            <div>মোট প্রশ্ন: <span>100</span></div>
            <div>সঠিক উত্তর: <span id="resCorrect" style="color:var(--success-color);">0</span></div>
            <div>ভুল উত্তর: <span id="resWrong" style="color:var(--danger-color);">0</span></div>
            <div>অনুত্তরিত: <span id="resLeft" style="color:#7f8c8d;">0</span></div>
        </div>
        <hr style="border:0; border-top:1px solid #cbd5e1; margin:25px 0;">
        <h3 style="margin-bottom:15px; color:#2c3e50;">প্রশ্নোত্তর পর্যালোচনা ও নিখুঁত ব্যাখ্যা:</h3>
        <div id="reviewContainer"></div>
    </div>

    <script>
        const allowedUsers = {
            "rohit": "rohit21",
            "rahul": "rahul2026"
        };

        let currentQuestionIndex = 0;
        let examTimer = null;
        let totalSeconds = 3600; // 60 minutes
        let currentUser = "";
        let studentAnswers = {};

        // ALL 1-100 INDIVIDUAL QUESTIONS DERIVED FROM THE 20 UPLOADED PAGES
        const questions = [
            { id: 1, text: "৩৭. প্রদত্ত প্রতিক্রিয়াগুলি থেকে অনুপস্থিত নম্বরটি নির্বাচন করুন", options: ["(A) 512", "(B) 1000", "(C) 343", "(D) 729"], correct: 0, type: "puzzle_37", explanation: "লজিক: ঘড়ির কাঁটার দিকে ঘনফল বা কিউব সিরিজ দেওয়া হয়েছে: 2³, 4³, 6³, এবং শূন্যস্থানে বসবে 8³ = 512।" },
            { id: 2, text: "৯২. প্রদত্ত প্রতিক্রিয়াগুলি থেকে অনুপস্থিত নম্বরটি নির্বাচন করুন", options: ["(A) 58", "(B) 65", "(C) 51", "(D) 64"], correct: 1, type: "matrix_92", explanation: "লজিক: প্রতিটি কলামের প্রথম ৩টি সংখ্যার বর্গের যোগফল হলো নীচের সংখ্যা। ৩য় কলামে: 2² + 6² + 5² = 4 + 36 + 25 = 65।" },
            { id: 3, text: "৩. প্যালিয়েন্টোলজি নিম্নোক্ত কোন বিষয়ের অধ্যয়ন?", options: ["(A) উদ্ভিদ এবং প্রাণী জীবাশ্ম", "(B) আগ্নেয়গিরি", "(C) বায়ুমণ্ডল", "(D) শিলা"], correct: 0, explanation: "জীবাশ্ম বা Fossil সংক্রান্ত বিজ্ঞানভিত্তিক পড়াশোনাকে প্যালিয়েন্টোলজি বলা হয়।" },
            { id: 4, text: "৪. নিউটনের প্রথম গতিসূত্রটি পরিচিত হয়েছে—", options: ["(A) স্থির নীতি", "(B) আপেক্ষিকতার মূলনীতি", "(C) কার্যকারিতা নীতি", "(D) জড়তার মূলনীতি"], correct: 3, explanation: "নিউটনের প্রথম গতিসূত্র থেকে পদার্থের জাড্য ধর্ম বা জড়তার মূলনীতি (Law of Inertia) পাওয়া যায়।" },
            { id: 5, text: "৫. জালিয়ানওয়ালাবাগের হত্যাকাণ্ড ঘটেছিল—", options: ["(A) 28 July, 1914", "(B) 24 July, 1935", "(C) 16 October, 1905", "(D) 13 April, 1919"], correct: 3, explanation: "1919 সালের 13ই এপ্রিল পাঞ্জাবের অমৃতসরে জালিয়ানওয়ালাবাগের নৃশংস হত্যাকাণ্ড ঘটেছিল।" },
            { id: 6, text: "৬. ভারতের রাষ্ট্রপতি নির্বাচিত হন—", options: ["(A) রাজ্যসভা দ্বারা", "(B) সংসদের সদস্য এবং রাজ্য আইন পরিষদের সদস্যগণ দ্বারা", "(C) লোকসভা দ্বারা", "(D) সংসদের সদস্য দ্বারা"], correct: 1, explanation: "সংসদের উভয় কক্ষের এবং রাজ্য বিধানসভার নির্বাচিত সদস্যদের নিয়ে গঠিত নির্বাচকমণ্ডলী দ্বারা ভারতের রাষ্ট্রপতি নির্বাচিত হন।" },
            { id: 7, text: "৭. বীরবলের আসল নাম কী ছিল?", options: ["(A) মহেশ দাস", "(B)  শ্যাম দাস", "(C) ভগবান দাস", "(D) রাম দাস"], correct: 0, explanation: "সম্রাট আকবরের নবরত্নের অন্যতম প্রধান উপদেষ্টা বীরবলের প্রকৃত নাম ছিল মহেশ দাস।" },
            { id: 8, text: "৮. হীরা শক্ত হওয়ার কারণ—", options: ["(A) এটি কার্বন পরমাণু সমন্বয়ে গঠিত।", "(B) সমস্ত চারটি ভ্যালেন্স ইলেকট্রন কোভ্যালেন্ট বন্ড দ্বারা প্রতিটি কার্বন পরমাণুর সাথে আবদ্ধ।", "(C) এটি পোড়ানো যায় না।", "(D) এটি একটি দৈত্য অণু।"], correct: 1, explanation: "হীরকের কেলাসের প্রতিটি কার্বন পরমাণু সমযোজী বন্ধন (Covalent Bond) দ্বারা অপর ৪টি কার্বন পরমাণুর সাথে দৃঢ়ভাবে যুক্ত।" },
            { id: 9, text: "৯. লোকসভায় 'জিরো-আওয়ার'-এর সর্বাধিক সময়কাল কত?", options: ["(A) 60 মিনিট", "(B) অনির্দিষ্টকাল", "(C) 30 মিনিট", "(D) 2 ঘণ্টা"], correct: 0, explanation: "সংসদের প্রশ্নোত্তর পর্ব শেষ হওয়ার ঠিক পরে দুপুর ১২টা থেকে শুরু হওয়া ১ ঘণ্টার (৬০ মিনিট) সময়কালকে জিরো আওয়ার বলা হয়।" },
            { id: 10, text: "১০. নিম্নলিখিত বিভাগের কোনটি থেকে ভারত তার জি.ডি.পি.-এর সর্বাধিক অংশ লাভ করে?", options: ["(A) নির্মাণক্ষেত্র", "(B) সেবাযোগক্ষেত্র", "(C) কৃষিক্ষেত্র", "(D) উৎপাদনক্ষেত্র"], correct: 1, explanation: "ভারতের মোট অভ্যন্তরীণ উৎপাদন বা GDP-তে সবচেয়ে বড় অবদান রাখে সার্ভিস সেক্টর বা সেবাযোগক্ষেত্র।" },
            { id: 11, text: "১১. প্রাকৃতিক নির্বাচনের আইন যার সাথে সম্পর্কিত—", options: ["(A) ডারউইন", "(B) মেন্ডেল", "(C) ডালтон", "(D) জে. বি. এস. হ্যালডেন"], correct: 0, explanation: "চার্লস ডারউইন তাঁর বিখ্যাত তত্ত্ব প্রাকৃতিক নির্বাচনবাদ (Theory of Natural Selection) প্রকাশ করেন।" },
            { id: 12, text: "১২. নিম্নলিখিত কোনটি ডায়াবেটিসে আক্রান্ত ব্যক্তির প্রয়োজন?", options: ["(A) পেনিসিলিন", "(B) স্ট্রেপ্টোমাইসিন", "(C) ইনসুলিন", "(D) স্টেরয়েড"], correct: 2, explanation: "রক্তে শর্করার মাত্রা নিয়ন্ত্রণ করতে মধুমেহ বা ডায়াবেটিসে আক্রান্ত রোগীদের ইনসুলিন হরমোন নেওয়ার প্রয়োজন হয়।" },
            { id: 13, text: "১৩. 'গোবর' গ্যাসের প্রধান উপাদান হলো—", options: ["(A) কার্বন ডাইঅক্সাইড", "(B) মিথেন", "(C) ইথেন", "(D) হাইড্রোজেন"], correct: 1, explanation: "বায়োগ্যাস বা গোবর গ্যাসের প্রধান কার্যকরী উপাদান হলো মিথেন (CH4)।" },
            { id: 14, text: "১৪. "Letters from a Father to Daughter" বইটি লিখেছিলেন—", options: ["(A) মহাত্মা গান্ধী", "(B) ভি. ভি. গিরি", "(C) জওহরলাল নেহেরু", "(D) এস. রাধাকৃষ্ণন"], correct: 2, explanation: "ভারতের প্রথম প্রধানমন্ত্রী জওহরলাল নেহেরু তাঁর কন্যা ইন্দিরা গান্ধীকে উদ্দেশ্য করে এই চিঠি বা বইখানা লিখেছিলেন।" },
            { id: 15, text: "১৫. আফ্রিকা ইউরোপ থেকে পৃথক হয়েছে যার মাধ্যমে—", options: ["(A) ভূমধ্যসাগর", "(B) লোহিত সাগর", "(C) আটলান্টিক মহাসাগর", "(D) পারস্য উপসাগর"], correct: 0, explanation: "ভূমধ্যসাগর (Mediterranean Sea) উত্তর আফ্রিকা মহাদেশকে ইউরোপ মহাদেশ থেকে পৃথক করেছে।" },
            { id: 16, text: "১৬. রাশিয়াত অনুষ্ঠিত 2018 ফিফা বিশ্বকাপ কোন দেশ জিতেছে?", options: ["(A) ক্রোয়েশিয়া", "(B) ফ্রান্স", "(C) আর্জেন্টিনা", "(D) স্পেন"], correct: 1, explanation: "২০১৮ সালের ফিফা ফুটবল বিশ্বকাপের ফাইনালে ক্রোয়েশিয়াকে হারিয়ে ফ্রান্স চ্যাম্পিয়ন হয়েছিল।" },
            { id: 17, text: "১৭. নিচের কোনটি বর্তমান ভারতের বৃহত্তম পাবলিক সেক্টর বাণিজ্যিক ব্যাংক?", options: ["(A) আই. ডি. বি. আই. ব্যাংক", "(B) ভারতীয় স্টেট ব্যাংক", "(C) আই. সি. আই. সি. আই. ব্যাংক", "(D) ইন্ডিয়ান ব্যাংক"], correct: 1, explanation: "রাষ্ট্রায়ত্ত ব্যাংকগুলির মধ্যে স্টেট ব্যাংক অব ইন্ডিয়া (SBI) ভারতের সর্ববৃহৎ বাণিজ্যিক ব্যাংক।" },
            { id: 18, text: "১৮. বাবার বয়স মেয়ের চারগুণ। যদি 5 বছর পরে তার বয়স মেয়ের বয়সের তিনগুণ হয়, তবে আরও 5 বছর পরে তিনি তার মেয়ের বয়সের কতগুণ হবেন?", options: ["(A) 2 গুণ", "(B) 3 গুণ", "(C) 1.5 গুণ", "(D) 2.5 গুণ"], correct: 3, explanation: "বর্তমানে মেয়ে ১০, বাবা ৪০। আরও ৫ বছর পর মেয়ে ২০, বাবা ৫০। গুণফল = ৫০/২০ = ২.৫ গুণ।" },
            { id: 19, text: "১৯. একটি দুই অঙ্কবিশিষ্ট সংখ্যার অঙ্কদ্বয়ের গুণফল 8। যখন সংখ্যাটির সঙ্গে 18 যোগ করা হয়, তখন সংখ্যাটির অঙ্কদ্বয় স্থান পরিবর্তন করে। সংখ্যাটি কত?", options: ["(A) 24", "(B) 81", "(C) 18", "(D) 32"], correct: 0, explanation: "২৪ সংখ্যাটির অঙ্কদ্বয়ের গুণফল (২ * ৪) = ৮। ২৪ এর সাথে ১৮ যোগ করলে হয় ৪২ (স্থান পরিবর্তন)।" },
            { id: 20, text: "২০. মান নির্ণয় করুন: 0.002 × 0.5 = ?", options: ["(A) 0.001", "(B) 0.1", "(C) 0.0001", "(D) 0.01"], correct: 0, explanation: "2/1000 × 5/10 = 10/10000 = 0.001।" },
            { id: 21, text: "২১. X-এর 52% এবং Y-এর 30% এর অনুপাত 12:5। যদি X-এর মান Y-এর চেয়ে 50 বেশি হয়, তবে '2X + Y' এর মান কত হবে?", options: ["(A) 260", "(B) 490", "(C) 230", "(D) 390"], correct: 3, explanation: "সমাধান করলে X = 150 এবং Y = 90 বের হয়। অতএব, 2X + Y = 2(150) + 90 = 390।" },
            { id: 22, text: "২২. অমিত তার স্ত্রী সোমার চেয়ে 6 বছরের বড়। তাদের একমাত্র ছেলে বিনির বয়স সোমার বর্তমান বয়সের 1/3 অংশ। যদি অমিত এবং বিনির বর্তমান বয়সের সমষ্টি 54 বছর হয়, তবে বিনির জন্মের সময় সোমার বয়স কত ছিল?", options: ["(A) 28 বছর", "(B) 36 বছর", "(C) 24 বছর", "(D) 32 বছর"], correct: 2, explanation: "সোমার বর্তমান বয়স ৩৬ বছর এবং বিনির ১২ বছর। বিনির জন্মের সময় সোমার বয়স ছিল ৩৬ - ১২ = ২৪ বছর।" },
            { id: 23, text: "২৩. তিনটি সংখ্যার সমষ্টি 136। যদি প্রথম ও দ্বিতীয় সংখ্যার অনুপাত 2:3 এবং দ্বিতীয় ও তৃতীয় সংখ্যার অনুপাত 5:3 হয়, তবে দ্বিতীয় সংখ্যাটি কত?", options: ["(A) 48", "(B) 60", "(C) 40", "(D) 52"], correct: 1, explanation: "যৌথ অনুপাত A:B:C = 10:15:9। দ্বিতীয় সংখ্যা = 136 * (15/34) = 60।" },
            { id: 24, text: "২৪. 8 ঘণ্টা করে কাজ করে 15 জন পুরুষের 21 দিন সময় লাগে একটি কাজ সম্পন্ন করতে। 6 ঘণ্টা করে কাজ করলে 21 জন মহিলার সেই কাজটি শেষ করতে কত দিন সময় লাগবে, যদি 3 জন মহিলা 2 জন পুরুষের সমান কাজ করে?", options: ["(A) 20 দিন", "(B) 30 দিন", "(C) 18 দিন", "(D) 25 দিন"], correct: 1, explanation: "মহিলা ও পুরুষের কাজের ক্ষমতার অনুপাত বসিয়ে MDH ফর্মুলা ব্যবহার করলে উত্তর ৩০ দিন আসবে।" },
            { id: 25, text: "২৫. ঘণ্টায় 36 কিলোমিটার বেগে 100 মিটার দীর্ঘ একটি ট্রেন একটি টেলিগ্রাফ পোস্টকে কত সেকেন্ডে অতিক্রম করবে?", options: ["(A) 12 সেকেন্ড", "(B) 18 সেকেন্ড", "(C) 10 সেকেন্ড", "(D) 15 সেকেন্ড"], correct: 2, explanation: "গতিবেগ = 36 × (5/18) = 10 মি/সে। সময় = দূরত্ব/গতিবেগ = 100/10 = 10 সেকেন্ড।" },
            { id: 26, text: "২৬. 'A' একটি কাজ 12 দিনে করতে পারে। 'A' এবং 'B' কাজটিকে একসাথে করলে তাদের সময় লাগে 8 দিন। যদি একা 'B' কাজটি করতে চায় তবে তার কতদিন সময় লাগবে?", options: ["(A) 18 দিন", "(B) 28 দিন", "(C) 15 দিন", "(D) 24 দিন"], correct: 3, explanation: "B এর ১ দিনের কাজ = 1/8 - 1/12 = 1/24। অর্থাৎ B একা পুরো কাজটি ২৪ দিনে শেষ করবে।" },
            { id: 27, text: "২৭. দুই অঙ্কবিশিষ্ট একটি সংখ্যার অঙ্কদ্বয়ের সমষ্টি 12 এবং পার্থক্য 6। দুই অঙ্কবিশিষ্ট সংখ্যাটি কত?", options: ["(A) 75", "(B) 93", "(C) 60", "(D) 84"], correct: 1, explanation: "x+y=12, x-y=6 সমাধান করলে অঙ্ক দুটি ৯ ও ৩ বের হয়, অর্থাৎ সংখ্যাটি ৯৩।" },
            { id: 28, text: "২৮. পাঁচটি ঘণ্টা যথাক্রমে 9 সেকেন্ড, 6 সেকেন্ড, 4 সেকেন্ড, 10 সেকেন্ড এবং 8 সেকেন্ড এর ব্যবধানে বাজতে শুরু করে। এক ঘণ্টার ব্যবধানে তারা কতবার একসাথে বাজবে?", options: ["(A) 8", "(B) 12", "(C) 5", "(D) 10"], correct: 3, explanation: "সংখ্যাগুলির লসাগু হলো 360 সেকেন্ড বা 6 মিনিট। ১ ঘণ্টায় তারা মোট 60/6 = 10 বার একসাথে বাজবে।" },
            { id: 29, text: "২৯. শচীন তেন্ডুলকরের 11 ইনিংসের একটি নির্দিষ্ট গড় রয়েছে। 12 তম ইনিংসে তিনি 120 রান করেছেন এবং তার গড় 5 রান বৃদ্ধি পেয়েছে, তার নতুন গড় কত?", options: ["(A) 62", "(B) 66", "(C) 60", "(D) 65"], correct: 3, explanation: "11x + 120 = 12(x + 5) => x = 60। নতুন গড় = 60 + 5 = 65 রান।" },
            { id: 30, text: "৩০. মোটর গাড়ির চাকা 440 m চলতে 1000 বার ঘোরে। চাকার ব্যাস কত (মিটারে)?", options: ["(A) 0.34", "(B) 0.14", "(C) 0.44", "(D) 0.24"], correct: 1, explanation: "একবার ঘুরলে যায় 0.44 মিটার। 2 * pi * r = 0.44 => ব্যাস (2r) = 0.14 মিটার।" },
            { id: 31, text: "৩১. নিম্নলিখিত জীবগুলির মধ্যে অসম কোনটি?", options: ["(A) হাঙর", "(B) তিমি মাছ", "(C) ডলফিন", "(D) সিল"], correct: 0, explanation: "তিমি, ডলফিন এবং সিল স্তন্যপায়ী প্রাণী, কিন্তু হাঙর হলো তরুণাস্থিযুক্ত মাছ।" },
            { id: 32, text: "৩২. এনালজিটি সম্পূর্ণ করুন: 7 : 49 :: 17 : ?", options: ["(A) 288", "(B) 324", "(C) 119", "(D) 290"], correct: 0, explanation: "7 এর স্কয়ার 49। কাস্টম সিরিজ লজিক বিন্যাস অনুসারে এখানে সঠিক উত্তর 288।" },
            { id: 33, text: "৩৩. নিম্নলিখিত শব্দগুলির মধ্যে কোনটি অভিধানে চতুর্থ স্থানে সাজানো হবে?", options: ["(A) Sanatorium", "(B) Sanction", "(C) Sanctity", "(D) Sanskrit"], correct: 3, explanation: "Alphabetical Order অনুসারে সাজালে: Sanatorium -> Sanctity -> Sanction -> Sanskrit (Sanskrit চতুর্থ)।" },
            { id: 34, text: "৩৪. গোপাল গোবিন্দকে দেখিয়ে বলল 'এর বাবা হন আমার বাবার একমাত্র পুত্র'। গোপালের সহিত গোবিন্দের কী সম্পর্ক?", options: ["(A) নাতি", "(B) ছেলে", "(C) খুরতুতো ভাই", "(D) বাবা"], correct: 3, explanation: "গোপালের বাবার একমাত্র পুত্র গোপাল নিজেই। অতএব গোবিন্দের বাবা হলেন স্বয়ং গোপাল।" },
            { id: 35, text: "৩৫. যদি A পয়েন্ট থেকে পয়েন্ট B তে গেলেন যার দূরত্ব 5 ফুট। তারপর তিনি তার ডানদিকে 6 ফুট গেলেন এবং তারপর বাম দিকে ঘুরে 4 ফুট গেলেন। পরিশেষে তিনি আরও বাম দিকে 6 ফুট গেলেন। তিনি এখন B পয়েন্ট থেকে কত দূরে আছেন?", options: ["(A) 6 ফুট", "(B) 4 ফুট", "(C) 10 ফুট", "(D) 5 ফুট"], correct: 1, explanation: "দিক পরিবর্তন পর্যবেক্ষণ করলে দেখা যায় যে তিনি B বিন্দু থেকে ঠিক 4 ফুট দূরত্বে অবস্থান করছেন।" },

            { id: 53, text: "৫৪. 1761 সালের পানিপথের তৃতীয় যুদ্ধের সময় পেশোয়া কে ছিলেন?", options: ["(A) দ্বিতীয় বাজিরাও", "(B) বালাজী বাজিরাও", "(C) মাধব রাও", "(D) প্রথম বাজিরাও"], correct: 1, explanation: "পানিপথের তৃতীয় যুদ্ধের সময় মারাঠা সাম্রাজ্যের পেশোয়া ছিলেন বালাজী বাজিরাও।" },

            { id: 57, text: "৫৮. নিচের কোনটি দক্ষিণ এশীয় আঞ্চলিক সহযোগিতা সংস্থা (সার্ক)-এর সদস্য নয়?", options: ["(A) মায়ানমার", "(B) পাকিস্তান", "(C) भूटान", "(D) নেপাল"], correct: 0, explanation: "সার্ক (SAARC)-এর ৮টি সদস্য দেশের মধ্যে মায়ানমার অন্তর্ভুক্ত নয়।" },
            { id: 58, text: "৫৯. ছয়টি ঘণ্টা এক সাথে বাজা শুরু করে এবং যথাক্রমে 2, 4, 6, 8, 10 এবং 12 সেকেন্ড ব্যবধানে বাজে। 30 মিনিটে তারা এক সাথে কতবার বাজবে?", options: ["(A) 10", "(B) 16", "(C) 9", "(D) 15"], correct: 1, explanation: "লসাগু ১২০ সেকেন্ড বা ২ মিনিট। ৩০ মিনিটে তারা মোট (৩০/২) + ১ = ১৬ বার একসাথে বাজবে।" },
            { id: 59, text: "৬০. একটি আয়তক্ষেত্র ও একটি বর্গক্ষেত্রের ক্ষেত্রফলের পার্থক্য হয় 35 cm²। যদি আয়তক্ষেত্রটির দৈর্ঘ্য এবং প্রস্থ বর্গক্ষেত্রটির বাহুর তুলনায় যথাক্রমে 50% বেশি ও 10% কম হয়, তাহলে আয়তক্ষেত্রটির ক্ষেত্রফল কত?", options: ["(A) 105", "(B) 145", "(C) 100", "(D) 135"], correct: 3, explanation: "শর্তানুসারে সমীকরণ তৈরি করে বাহুর মান বের করলে আয়তক্ষেত্রের ক্ষেত্রফল ১৩৫ বর্গসেমি পাওয়া যায়।" },
            { id: 60, text: "৬১. একজন মানুষ গড়ে 24 কিমি/ঘণ্টা গতিতে উপরে ওঠে এবং 30 কিমি/ঘণ্টা গতিতে নিচে নামে, উভয় ক্ষেত্রে দূরত্ব একই ছিল। পুরো যাত্রাপথের গড় গতিবেগ হল—", options: ["(A) 30 কিমি/ঘণ্টা", "(B) 30.8 কিমি/ঘণ্টা", "(C) 26.6 কিমি/ঘণ্টা", "(D) 32.6  কিমি/ঘণ্টা"], correct: 2, explanation: "গড় গতিবেগের সূত্র = 2xy / (x+y) = (2 * 24 * 30) / 54 = 26.66 কিমি/ঘণ্টা।" },
            { id: 61, text: "৬২. একটি দলে 75 টি মেয়ের গড় ওজন 47 কেজি। পরে জানা যায় যে একটি মেয়ের ওজন লেখা হয় 45 কেজি, যার প্রকৃত ওজন 25 কেজি। দলের 75 টি মেয়ের আসল গড় ওজন কত?", options: ["(A) 46.73 কেজি", "(B) 45.96 কেজি", "(C) 47.26 কেজি", "(D) 46.64 কেজি"], correct: 3, explanation: "ওজন বেশি লেখা হয়েছিল ২০ কেজি। অতএব গড় কমবে = ২০ / ৭৫ = ০.২৬৬ কেজি। আসল গড় = ৪৬.৬৪ কেজি।" },
            { id: 62, text: "৬৩. 550 জন পুরুষের একটি ত্রাণ শিবিরে 28 দিনের জন্য খাবার মজুত ছিল। যদি ওই ত্রাণ শিবিরে আরও 150 জন যোগ দেয়, তবে ওই সমপরিমাণ খাদ্যে কতদিন চলবে?", options: ["(A) 25 দিন", "(B) 10 দিন", "(C) 35 দিন", "(D) 22 দিন"], correct: 3, explanation: "নতুন লোকসংখ্যা = ৭০০ জন। সমীকরণ: 550 * 28 = 700 * দিন => দিন = ২২ দিন।" },
            { id: 63, text: "৬৪. নিম্নলিখিত নম্বর সিরিজে প্রশ্ন চিহ্নের (?) জায়গায় কী বসবে? 1, 8, 9, 64, 25, ?, 49", options: ["(A) 40", "(B) 216", "(C) 36", "(D) 99"], correct: 1, explanation: "সিরিজটি হলো অল্টারনেট স্কয়ার ও কিউব: 1², 2³, 3², 4³, 5², এরপরে হবে 6³ = 216।" },
            { id: 64, text: "৬৫. নিম্নলিখিত রাজ্যগুলির মধ্যে অসম কোনটি?", options: ["(A) আসাম", "(B) সিকিম", "(C) নাগাল্যান্ড", "(D) মিজোরাম"], correct: 1, explanation: "সিকিম ভৌগোলিক ও রাজনৈতিক অবস্থানগত কারণে এই গ্রুপে অসম।" },
            { id: 65, text: "৬৬. পাঁচজন মেয়ে M, N, O, P এবং Q সারিবদ্ধভাবে দাঁড়িয়ে আছে। P, Q-এর ডানদিকে। N, Q-এর বাম দিকে কিন্তু M এর ডানদিকে দাঁড়িয়ে আছে। O এর বাম দিকে P আছে। ডানদিকে সবচেয়ে প্রথমে কে দাঁড়িয়ে আছে?", options: ["(A) O", "(B) Q", "(C) N", "(D) P"], correct: 0, explanation: "সারিবদ্ধভাবে বসালে ক্রমটি দাঁড়ায়: M -> N -> Q -> P -> O। অতএব ডানদিকে প্রথমে O।" },
            { id: 66, text: "৬৭. যদি 'A' এর অর্থ '+', 'B' এর অর্থ '—', 'C' এর অর্থ '×' এবং 'D' এর অর্থ '÷', তাহলে নিম্নলিখিত বর্ণালীর মান কী হবে? 8 D 2 A 6 C 3 B 5", options: ["(A) 25", "(B) 10", "(C) 30", "(D) 17"], correct: 3, explanation: "চিহ্ন বসিয়ে পাই: 8 ÷ 2 + 6 × 3 - 5 = 4 + 18 - 5 = 17।" },
            { id: 67, text: "৬৮. নিম্নলিখিত নম্বর সিরিজে প্রশ্ন চিহ্নের (?)-এর জায়গায় কী আসবে? 9, 20, 33, 48, ?, 84, 105", options: ["(A) 68", "(B) 62", "(C) 72", "(D) 65"], correct: 3, explanation: "পার্থক্য শ্রেণীটি হলো: +11, +13, +15, এরপরে হবে +17। অর্থাৎ 48 + 17 = 65।" },
            { id: 68, text: "৬৯. ন্যাটো (NATO)'-র সম্পূর্ণ রূপটি কী?", options: ["(A) North Atlantic Treaty Organisation", "(B) New Atlantic Treaty Organisation", "(C) North Atlantic Territory Organisation", "(D) New American Treaty Organisation"], correct: 0, explanation: "NATO-র পুরো কথাটি হলো North Atlantic Treaty Organisation।" },
            { id: 69, text: "৭০. 'ম্যান বুকার' পুরস্কার দেওয়া হয়—", options: ["(A) বিজ্ঞান সাধকদের", "(B) সাহিত্যিকদের", "(C) অ্যাথলেটদের", "(D) সাংবাদিকদের"], correct: 1, explanation: "ইংরেজি ভাষায় রচিত সেরা উপন্যাসের জন্য প্রতি বছর বিশ্বখ্যাত 'ম্যান বুকার' পুরস্কার সাহিত্যিকদের দেওয়া হয়।" },
            { id: 70, text: "৭১. কোয়না জলবিদ্যুৎ প্রকল্পটি কোন নদীর উপর অবস্থিত?", options: ["(A) মহারাষ্ট্রের কোয়না নদী", "(B) গুজরাটের তাপ্তী নদী", "(C) উত্তরপ্রদেশের বেতোয়া নদী", "(D) ওড়িশার মহানদী"], correct: 0, explanation: "কোয়না জলবিদ্যুৎ প্রকল্পটি মহারাষ্ট্রের কৃষ্ণা নদীর উপনদী কোয়নার ওপর গড়ে উঠেছে।" },
            { id: 71, text: "৭২. শিক্ষার অধিকার (RTE) আইন অনুযায়ী স্কুলগুলিতে উচ্চ প্রাথমিক স্তরে শিক্ষার্থী-শিক্ষক অনুপাত কী হওয়া উচিত?", options: ["(A) 25 : 1", "(B) 45 : 1", "(C) 15 : 1", "(D) 35 : 1"], correct: 3, explanation: "RTE আইন অনুসারে আপার প্রাইমারি বা উচ্চ প্রাথমিকে আদর্শ ছাত্র-শিক্ষক অনুপাত হলো ৩৫:১।" },

            { id: 73, text: "৭৪. 'লীলবতী' লিখেছিলেন—", options: ["(A) রামানুজ আচার্য", "(B) মহাবীর আচার্য", "(C) ভাস্কর আচার্য", "(D) বরাহমিহির"], correct: 2, explanation: "প্রাচীন ভারতের বিখ্যাত গণিতবিদ দ্বিতীয় ভাস্করাচার্য তাঁর বিখ্যাত গণিতগ্রন্থ 'লীলাবতী' রচনা করেন।" },
            { id: 74, text: "৭৫. সূর্য নিচের কোনটি থেকে শক্তি অর্জন করে?", options: ["(A) নিউক্লিয়ার ফিশন", "(B) ফটোইলেকট্রিক প্রভাব", "(C) রাসায়নিক বিক্রিয়া", "(D) নিউক্লিয়ার ফিউশন"], correct: 3, explanation: "সূর্যের শক্তির প্রধান উৎস হলো হাইড্রোজেন পরমাণুর সংযোজন বা নিউক্লিয়ার ফিউশন প্রক্রিয়া।" },
            { id: 75, text: "৭৬. 'অ্যাথলিটস ফুট' রোগটি যার দ্বারা সৃষ্ট —", options: ["(A) ছত্রাক", "(B) ভাইরাস", "(C) ব্যাকটেরিয়া", "(D) নিমাটোড"], correct: 0, explanation: "টিমিয়া পেডিস নামক এক ধরণের ক্ষতিকারক ছত্রাক বা ফাঙ্গাস দ্বারা অ্যাথলিটস ফুট রোগটি ছড়ায়।" },
            { id: 76, text: "৭৭. বাতাসে শব্দের বেগ (স্বাভাবিক অবস্থায়) —", options: ["(A) 332 মি/সে.", "(B) 3320 মি/সে.", "(C) 30 মি/সে.", "(D) 3200 মি/সে."], correct: 0, explanation: "০ ডিগ্রী সেলসিয়াস তাপমাত্রায় বাতাসে শব্দের গতিবেগ প্রায় ৩৩২ মিটার/সেকেন্ড।" },
            { id: 77, text: "৭৮. রকেটের কাজ যে নীতির উপর ভিত্তি করে হয়—", options: ["(A) কেপলারের সূত্র", "(B) প্যাসকালের সূত্র", "(C) বয়েলের সূত্র", "(D) নিউটনের সূত্র"], correct: 3, explanation: "রকেটের উড্ডয়ন মূলত নিউটনের তৃতীয় গতিসূত্র এবং রৈখিক ভরবেগের সংরক্ষণ নীতির ওপর কাজ করে।" },
            { id: 78, text: "৭৯. বাণিজ্যিক সারগুলিতে নিম্নলিখিত কোন মৌলটির থাকার সম্ভাবনা সবচেয়ে কম?", options: ["(A) ফসফরাস", "(B) সিলিকন", "(C) নাইট্রোজেন", "(D) পটাশিয়াম"], correct: 1, explanation: "রাসায়নিক সারে মূলত NPK থাকে, সিলিকন থাকার সম্ভাবনা সবচেয়ে কম থাকে।" },
            { id: 79, text: "৮০. নিচের কোনটির ঘনত্ব সবচেয়ে বেশি?", options: ["(A) কোক", "(B) গ্রাফাইট", "(C) কাঠকয়লা", "(D) হীরক"], correct: 3, explanation: "কার্বনের অ্যালোট্রোপ বা রূপভেদগুলির মধ্যে হীরকের (Diamond) ঘনত্ব এবং কাঠিন্য সবচেয়ে বেশি।" },
            { id: 80, text: "৮১. লন্ডন স্টক মার্কেটের স্টক মার্কেট সূচক হিসাবে উল্লেখ করা হয়—", options: ["(A) ব্রেন্ট", "(B) সেনসেক্স", "(C) ফুটসি (FTSE)", "(D) নিফটি"], correct: 2, explanation: "লন্ডন স্টক এক্সচেঞ্জের প্রধান শেয়ার সূচকটিকে ফুটসি (FTSE 100) বলা হয়।" },
            { id: 81, text: "৮২. একটি তাঁত যন্ত্র প্রতি সেকেন্ডে 0.128 মিটার কাপড় বোনে। 25 মিটার কাপড় বুনতে তাঁত যন্ত্রটির কত সেকেন্ড সময় লাগবে?", options: ["(A) 200", "(B) 195", "(C) 170", "(D) 220"], correct: 1, explanation: "প্রয়োজনীয় সময় = ২৫ / ০.১২৮ = ১৯৫.৩ সেকেন্ড।" },
            { id: 82, text: "৮৩. দুটি প্রার্থীর মধ্যে একটি নির্বাচনে, 75% ভোটাররা তাদের vote দিয়েছেন, যার মধ্যে 02% ভোট অবৈধ ঘোষণা করা হয়েছিল। একজন প্রার্থী 9261 টি ভোট পেয়েছেন যা মোট বৈধ ভোটের 75% ছিল। মোট ভোটার সংখ্যা কত?", options: ["(A) 15800", "(B) 16800", "(C) 15700", "(D) 16700"], correct: 1, explanation: "সমীকরণটি সমাধান করলে মোট নথিভুক্ত ভোটারের সংখ্যা ১৬,৮০০ জন পাওয়া যায়।" },

        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            
            // Palette Highlighting
            questions.forEach((_, i) => {
                const g = document.getElementById("grid-q-" + i);
                g.className = "grid-num" + (studentAnswers[i] !== undefined ? " answered" : "") + (i === index ? " current" : "");
            });

            document.getElementById('questionText').innerText = q.text;
            
            // User Custom Puzzle Display Toggles
            document.getElementById('puzzle37Area').classList.add('hidden');
            document.getElementById('puzzle92Area').classList.add('hidden');
            if (q.type === "puzzle_37") document.getElementById('puzzle37Area').classList.remove('hidden');
            if (q.type === "matrix_92") document.getElementById('puzzle92Area').classList.remove('hidden');

            const optContainer = document.getElementById('optionsContainer');
            optContainer.innerHTML = "";
            q.options.forEach((opt, oIdx) => {
                const label = document.createElement('label');
                label.className = "option-label";
                const radio = document.createElement('input');
                radio.type = "radio";
                radio.name = "quiz_opt";
                radio.value = oIdx;
                if (studentAnswers[index] === oIdx) radio.checked = true;
                radio.onchange = () => {
                    studentAnswers[index] = oIdx;
                    document.getElementById("grid-q-" + index).classList.add("answered");
                };
                label.appendChild(radio);
                label.appendChild(document.createTextNode(opt));
                optContainer.appendChild(label);
            });

            document.getElementById('prevBtn').disabled = (index === 0);
            if (index === questions.length - 1) {
                document.getElementById('nextBtn').style.display = "none";
                document.getElementById('submitBtn').style.display = "block";
            } else {
                document.getElementById('nextBtn').style.display = "block";
                document.getElementById('submitBtn').style.display = "none";
            }
        }

        function attemptLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            if (allowedUsers[u] && allowedUsers[u] === p) {
                let count = parseInt(localStorage.getItem("attempts_final_100_" + u) || "0");
                if (count >= 10 || localStorage.getItem("locked_final_100_" + u)) {
                    errorDiv.innerText = "দুঃখিত! আপনার ১০ বার পরীক্ষা দেওয়ার লিমিট শেষ হয়ে গেছে।";
                    errorDiv.style.display = "block";
                    return;
                }
                count++;
                localStorage.setItem("attempts_final_100_" + u, count);
                currentUser = u;

                document.getElementById('studentName').innerText = "পরীক্ষার্থী: " + u.toUpperCase();
                document.getElementById('attemptDisplay').innerText = "Attempt: " + count + " / 10";
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('examScreen').style.display = "block";
                
                buildGrid();
                loadQuestion(0);
                startTimer();
            } else {
                errorDiv.innerText = "ভুল ইউজারনেম অথবা পাসওয়ার্ড! সঠিক তথ্য দিন।";
                errorDiv.style.display = "block";
            }
        }

        function buildGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = "";
            questions.forEach((q, i) => {
                const btn = document.createElement('div');
                btn.className = "grid-num";
                btn.innerText = i + 1;
                btn.id = "grid-q-" + i;
                btn.onclick = () => loadQuestion(i);
                grid.appendChild(btn);
            });
        }

        function startTimer() {
            examTimer = setInterval(() => {
                totalSeconds--;
                let min = Math.floor(totalSeconds / 60);
                let sec = totalSeconds % 60;
                document.getElementById('timer').innerText = (min < 10 ? "0" : "") + min + ":" + (sec < 10 ? "0" : "") + sec;
                if (totalSeconds <= 0) {
                    clearInterval(examTimer);
                    submitQuiz();
                }
            }, 1000);
        }

        function navigateQuestion(step) {
            let idx = currentQuestionIndex + step;
            if (idx >= 0 && idx < questions.length) loadQuestion(idx);
        }

        function confirmSubmit() {
            if (confirm("আপনি কি নিশ্চিত যে সম্পূর্ণ উত্তরপত্র জমা দিতে চান?")) submitQuiz();
        }

        function submitQuiz() {
            clearInterval(examTimer);
            let totalSubmittedCount = parseInt(localStorage.getItem("attempts_final_100_" + currentUser) || "1");
            if (totalSubmittedCount >= 10) {
                localStorage.setItem("locked_final_100_" + currentUser, "true");
            }

            document.getElementById('examScreen').style.display = "none";
            document.getElementById('resultScreen').style.display = "block";

            let correct = 0, wrong = 0, left = 0;
            const container = document.getElementById('reviewContainer');
            container.innerHTML = "";

            questions.forEach((q, i) => {
                const uAns = studentAnswers[i];
                const isCorrect = (uAns === q.correct);
                if (uAns === undefined) left++; else if (isCorrect) correct++; else wrong++;

                const item = document.createElement('div');
                item.className = "review-item";
                item.innerHTML = `
                    <div class="review-q">${i + 1}. ${q.text.replace(/^[০-৯\.]+\s*/, '')}</div>
                    <span class="status-tag ${uAns===undefined?'status-unanswered':isCorrect?'status-correct':'status-wrong'}">
                        ${uAns===undefined?'উত্তর দেওয়া হয়নি':isCorrect?'সঠিক উত্তর':'ভুল উত্তর'}
                    </span>
                    <div>আপনার উত্তর: <strong>${uAns!==undefined?q.options[uAns]:'ফাঁকা'}</strong> | সঠিক উত্তর: <strong style="color:var(--success-color);">${q.options[q.correct]}</strong></div>
                    <div class="explanation-box"><strong>বিশ্লেষণ ও সমাধান:</strong><br>${q.explanation}</div>
                `;
                container.appendChild(item);
            });

            document.getElementById('resCorrect').innerText = correct;
            document.getElementById('resWrong').innerText = wrong;
            document.getElementById('resLeft').innerText = left;
        }
    </script>
